# -----------------------------------------------------------------------------
# Base config for model evaluation
# -----------------------------------------------------------------------------
defaults:
  - _self_
  - eval: null
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

# task name, determines output directory path
task_name: test

# path to root and logging directories
root_dir: .
log_dir: ${root_dir}/log

# path to permutations directory (used by sbnd.transforms.GenericPerms,
# typically through the TTADecoder.transform block below)
perms_dir: ${root_dir}/data/perms

# CSV output directory (one file per checkpoint, dedup/append on re-runs)
output_dir: ${log_dir}/${task_name}

# Suppress all of hydra's disk artifacts: no run dir, no .hydra/ snapshot,
# no .log file. Logging is colorlog-on-stdout only.
hydra:
  output_subdir: null
  run:
    dir: .
  job_logging:
    handlers:
      # Required to avoid hydra creating an empty test.log file in the root dir
      # `delay: true` defers FileHandler.open() until the first emit; since this
      # handler is detached from the root logger below, the file is never created.
      file:
        delay: true
    root:
      handlers: [console]

# -----------------------------------------------------------------------------
# Evaluation parameters
# -----------------------------------------------------------------------------

# Required: model checkpoint. Pass on CLI as `model=/path/to/foo.ckpt`
model: ???

# Eb/N0 sweep (dB)
snr_min: 0.0
snr_max: 5.0
snr_step: 1.0

# Monte Carlo sampling
num_batches: 1024
batch_size: 4096
num_workers: 8

# Hard-decision decoding emulation (requires a code with known dmin and a
# model trained in error_space=codeword); can be combined with TTS below
hdd: false

# Decoding strategy. Defaults to the no-TTS baseline (one forward pass per
# sample). Override in an eval preset or on the CLI to enable a test-time
# scaling variant, e.g.
#   # Self-Boosting (sequential TTS)
#   tts:
#     _target_: sbnd.tts.SelfBoostingDecoder
#     num_iters: 5
#
#   # TTA (parallel TTS via code automorphisms)
#   tts:
#     _target_: sbnd.tts.TTADecoder
#     num_perms: 4
#     transform:
#       _partial_: true
#       _target_: sbnd.transforms.BCHPerms
tts:
  _target_: sbnd.tts.SingleShotDecoder
