# @package _global_

# -----------------------------------------------------------------------------
# Code & neural decoder
# -----------------------------------------------------------------------------

code:
  _target_: sbnd.codes.LinearCode
  mat_file: ${codes_dir}/bch.63.45.mat

decoder:
  _target_: sbnd.gru.StackedGRU
  hidden_sz: 384
  n_layers: 2
  n_steps: 18
  dropout: 0.20
  
# -----------------------------------------------------------------------------
# Datasets for training, validation and testing
# -----------------------------------------------------------------------------
# 512K = 524288, 1M = 1048576, 2M = 2097152, 4M = 4194304, 16M = 16777216, 1B = 1073741824

data:  
  _target_: sbnd.data.SBNDDataModule
  ebno_dB_train: 2.0
  on_demand: false
  train_file: ${data_dir}/bch-63-45/train-ml-4M-2dB.mat
  train_bs: 4096
  val_file: ${data_dir}/bch-63-45/val-ml-512K-2dB.mat
  val_bs: 4096
  ebno_dB_test: [2.0, 3.0, 4.0]
  n_test_samples: 2097152
  test_bs: 4096
  transform:
    _partial_: true
    _target_: sbnd.transforms.BCHPerms
# -----------------------------------------------------------------------------
# Model-specific training setup
# -----------------------------------------------------------------------------

max_epochs: 512
lr: 0.001

optimizer:
  _partial_: true
  _target_: torch.optim.AdamW
  lr: ${lr}
  weight_decay: 0.02

lr_scheduler: 
  _partial_: true
  _target_: sbnd.lr_sched.WarmupStableDecayLR
  total: ${max_epochs}
  warmup: 10
  decay: 32

# -----------------------------------------------------------------------------
# Lightning module
# -----------------------------------------------------------------------------

model:
  _target_: sbnd.model.SBNDLitModule
  decoder:  ${decoder}
  optimizer: ${optimizer}
  lr_scheduler: ${lr_scheduler} 
